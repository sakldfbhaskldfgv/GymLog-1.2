<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GymLog">
<meta name="mobile-web-app-capable" content="yes">
<meta name="description" content="Seu app de treino pessoal">
<title>GymLog</title>
<link rel="manifest" href="manifest.json">

<!-- PWA Icons inline via SVG data URI -->
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%230f0f0f'/%3E%3Ctext x='96' y='130' font-size='110' text-anchor='middle' fill='%23c8ff00'%3E⚡%3C/text%3E%3C/svg%3E">

<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #242424;
  --surface3: #2e2e2e;
  --accent: #c8ff00;
  --accent-dim: rgba(200,255,0,0.12);
  --accent-dim2: rgba(200,255,0,0.06);
  --text: #f0f0f0;
  --text2: #888;
  --text3: #444;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --danger: #ff4d4d;
  --danger-dim: rgba(255,77,77,0.12);
  --info: #5b8aff;
  --info-dim: rgba(91,138,255,0.12);
  --radius: 14px;
  --radius-sm: 9px;
  --nav-h: 72px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Barlow', system-ui, sans-serif;
  font-size: 16px;
  overflow: hidden;
}

#app {
  max-width: 430px;
  margin: 0 auto;
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* HEADER */
.app-header {
  padding: 16px 20px 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}
.header-logo {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 22px;
  font-weight: 900;
  letter-spacing: 0.05em;
  color: var(--accent);
  text-transform: uppercase;
}
.header-logo span { color: var(--text2); font-weight: 700; }
.header-date { font-size: 12px; color: var(--text3); letter-spacing: 0.03em; }

/* PAGES */
.pages-wrap {
  flex: 1;
  overflow: hidden;
  position: relative;
}
.page {
  display: none;
  height: 100%;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px 20px calc(var(--nav-h) + var(--safe-bottom) + 16px);
}
.page.active { display: block; }

.section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.14em;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 10px;
}

/* WORKOUT CARDS */
.workout-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.workout-letter {
  width: 46px; height: 46px;
  border-radius: 11px;
  background: var(--accent-dim);
  color: var(--accent);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 22px;
  font-weight: 900;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.workout-info { flex: 1; min-width: 0; cursor: pointer; }
.workout-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
.workout-meta { font-size: 12px; color: var(--text2); }
.workout-actions { display: flex; gap: 6px; flex-shrink: 0; }

.icon-btn {
  width: 34px; height: 34px;
  border-radius: 9px;
  border: 1px solid var(--border2);
  background: transparent;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  color: var(--text2);
  transition: all 0.15s;
}
.icon-btn:active { opacity: 0.7; }
.icon-btn.danger:active { background: var(--danger-dim); border-color: var(--danger); }

.add-btn {
  width: 100%;
  padding: 14px;
  border-radius: var(--radius);
  border: 1px dashed var(--border2);
  background: transparent;
  color: var(--text2);
  font-size: 14px;
  font-family: 'Barlow', sans-serif;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  margin-top: 4px;
  transition: all 0.15s;
}
.add-btn:active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

/* EXERCISE PAGE */
.back-btn {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; color: var(--text2);
  cursor: pointer; margin-bottom: 16px;
  background: none; border: none; padding: 0;
  font-family: 'Barlow', sans-serif;
}
.workout-page-header {
  display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
}
.workout-page-letter {
  width: 50px; height: 50px;
  border-radius: 13px;
  background: var(--accent-dim);
  color: var(--accent);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 24px; font-weight: 900;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.workout-page-info { flex: 1; min-width: 0; }
.workout-page-info h2 {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 20px; font-weight: 800;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.workout-page-info p { font-size: 12px; color: var(--text2); margin-top: 2px; }

.exercise-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
}
.exercise-header {
  padding: 14px 16px;
  display: flex; align-items: center; gap: 8px;
}
.ex-main { flex: 1; min-width: 0; cursor: pointer; }
.ex-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ex-summary { font-size: 12px; color: var(--text2); margin-top: 2px; }
.ex-chevron { color: var(--text3); font-size: 13px; transition: transform 0.2s; cursor: pointer; flex-shrink: 0; }
.ex-chevron.open { transform: rotate(180deg); }
.ex-body { display: none; border-top: 1px solid var(--border); padding: 12px 16px; }
.ex-body.open { display: block; }

.set-labels {
  display: grid;
  grid-template-columns: 22px 1fr 1fr 30px 22px;
  gap: 6px; margin-bottom: 6px;
}
.set-label { font-size: 10px; color: var(--text3); text-align: center; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; }
.set-row {
  display: grid;
  grid-template-columns: 22px 1fr 1fr 30px 22px;
  gap: 6px; align-items: center; margin-bottom: 8px;
}
.set-num { font-size: 11px; color: var(--text3); font-weight: 700; text-align: center; }
.set-input {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 9px 4px;
  color: var(--text);
  font-size: 14px; font-family: 'Barlow', sans-serif;
  width: 100%; text-align: center; outline: none;
}
.set-input:focus { border-color: var(--accent); }
.set-check {
  width: 28px; height: 28px;
  border-radius: 7px;
  border: 1.5px solid var(--border2);
  background: transparent;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; flex-shrink: 0;
}
.set-check.done { background: var(--accent); border-color: var(--accent); }
.set-check.done::after { content: '✓'; color: #0f0f0f; font-size: 13px; font-weight: 700; }
.set-del {
  width: 20px; height: 20px; border-radius: 5px;
  border: none; background: transparent;
  cursor: pointer; color: var(--text3); font-size: 17px;
  display: flex; align-items: center; justify-content: center;
  padding: 0;
}
.add-set-btn {
  width: 100%; margin-top: 4px; padding: 9px;
  border-radius: 7px; border: 1px dashed var(--border2);
  background: transparent; color: var(--text2); font-size: 12px;
  font-family: 'Barlow', sans-serif; cursor: pointer;
}

.start-btn {
  width: 100%; padding: 16px;
  border-radius: var(--radius);
  background: var(--accent); color: #0f0f0f;
  font-size: 16px; font-weight: 700;
  font-family: 'Barlow Condensed', sans-serif;
  letter-spacing: 0.06em; text-transform: uppercase;
  border: none; cursor: pointer; margin-top: 8px;
}
.start-btn:active { opacity: 0.85; }

/* ACTIVE WORKOUT */
.active-top {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  flex-shrink: 0;
}
.active-top-row {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;
}
.active-workout-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 18px; font-weight: 800;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 240px;
}
.active-timer {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 20px; font-weight: 700;
  color: var(--accent);
  font-variant-numeric: tabular-nums;
  flex-shrink: 0;
}
.progress-track { height: 3px; background: var(--surface3); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s; }
.progress-txt { font-size: 11px; color: var(--text3); margin-top: 5px; }

#page-active-inner {
  flex: 1; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 12px 20px calc(var(--nav-h) + var(--safe-bottom) + 80px);
}
.active-ex-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px; overflow: hidden;
}
.active-ex-header {
  padding: 14px 16px;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer;
}
.active-ex-badge {
  font-size: 11px; font-weight: 700;
  background: var(--accent-dim); color: var(--accent);
  border-radius: 20px; padding: 3px 10px; flex-shrink: 0;
}
.active-ex-badge.done { background: var(--accent); color: #0f0f0f; }
.active-btns {
  padding: 0 20px 16px;
  flex-shrink: 0;
}
.finish-btn {
  width: 100%; padding: 16px;
  border-radius: var(--radius);
  background: var(--accent); color: #0f0f0f;
  font-size: 16px; font-weight: 700;
  font-family: 'Barlow Condensed', sans-serif;
  letter-spacing: 0.06em; text-transform: uppercase;
  border: none; cursor: pointer; margin-bottom: 10px;
  display: none;
}
.finish-btn.visible { display: block; }
.cancel-btn {
  width: 100%; padding: 12px;
  border-radius: var(--radius);
  background: transparent; color: var(--danger);
  font-size: 14px; font-weight: 600; font-family: 'Barlow', sans-serif;
  border: 1px solid var(--danger-dim); cursor: pointer;
}

/* HISTORY */
.history-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px; overflow: hidden;
}
.history-card-head {
  padding: 14px 16px;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer;
}
.hist-date {
  font-size: 10px; color: var(--accent); font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px;
}
.hist-name { font-size: 14px; font-weight: 600; }
.hist-stats { display: flex; gap: 14px; margin-top: 8px; flex-wrap: wrap; }
.hist-stat { font-size: 12px; color: var(--text2); }
.hist-stat span { color: var(--text); font-weight: 600; }
.hist-detail { display: none; border-top: 1px solid var(--border); padding: 12px 16px; }
.hist-detail.open { display: block; }
.hist-ex-name {
  font-size: 11px; font-weight: 700; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.07em;
  margin: 10px 0 6px;
}
.hist-ex-name:first-child { margin-top: 0; }
.hist-set-row {
  display: flex; gap: 14px; font-size: 13px;
  padding: 4px 0; border-bottom: 1px solid var(--border);
}
.hist-set-row:last-child { border-bottom: none; }
.hist-set-lbl { color: var(--text3); width: 50px; flex-shrink: 0; }

/* EVOLUÇÃO */
.evo-btn {
  width: 100%; background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px; text-align: left;
  cursor: pointer; font-size: 14px; font-family: 'Barlow', sans-serif;
  color: var(--text2); margin-bottom: 8px; transition: all 0.15s;
}
.evo-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
.evo-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px; margin-top: 4px;
}
.evo-title { font-size: 14px; font-weight: 700; margin-bottom: 3px; }
.evo-sub { font-size: 11px; color: var(--text2); margin-bottom: 14px; }

/* PERFIL */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.stat-tile {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px; text-align: center;
}
.stat-val {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 30px; font-weight: 900; color: var(--accent); line-height: 1;
}
.stat-lbl { font-size: 11px; color: var(--text3); margin-top: 5px; text-transform: uppercase; letter-spacing: 0.08em; }

.action-btn {
  width: 100%; padding: 15px 16px;
  border-radius: var(--radius);
  border: 1px solid var(--border2);
  background: transparent; color: var(--text);
  font-size: 14px; font-weight: 600; font-family: 'Barlow', sans-serif;
  cursor: pointer; display: flex; align-items: center; gap: 12px;
  margin-bottom: 10px; text-align: left; transition: all 0.15s;
}
.action-btn:active { background: var(--surface2); }
.action-icon {
  width: 38px; height: 38px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.action-icon.exp { background: var(--accent-dim); }
.action-icon.imp { background: var(--info-dim); }
.action-icon.del { background: var(--danger-dim); }
.action-info { flex: 1; }
.action-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.action-sub { font-size: 12px; color: var(--text2); font-weight: 400; }
.last-bk { font-size: 12px; color: var(--text3); text-align: center; margin: 4px 0 16px; }

.danger-zone { border-top: 1px solid var(--border); padding-top: 16px; margin-top: 8px; }

/* BOTTOM NAV */
.bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px;
  background: rgba(26,26,26,0.96);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  padding-bottom: var(--safe-bottom);
  z-index: 100;
}
.nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  cursor: pointer; padding: 10px 4px;
  color: var(--text3); font-size: 9px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  transition: color 0.15s; user-select: none;
}
.nav-item.active { color: var(--accent); }
.nav-icon { font-size: 22px; line-height: 1; }

/* MODALS */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.8); z-index: 500;
  align-items: flex-end; justify-content: center;
}
.overlay.open { display: flex; }
.sheet {
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  padding: 24px 20px calc(28px + var(--safe-bottom));
  width: 100%; max-width: 430px;
}
.sheet h3 {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 22px; font-weight: 800; margin-bottom: 16px;
}
.sheet-input {
  width: 100%;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 9px; padding: 13px 14px;
  color: var(--text); font-size: 16px; font-family: 'Barlow', sans-serif;
  outline: none; margin-bottom: 12px;
}
.sheet-input:focus { border-color: var(--accent); }
.sheet-confirm {
  width: 100%; padding: 15px;
  border-radius: 9px; background: var(--accent); color: #0f0f0f;
  font-size: 16px; font-weight: 700; font-family: 'Barlow Condensed', sans-serif;
  letter-spacing: 0.05em; text-transform: uppercase;
  border: none; cursor: pointer; margin-bottom: 10px;
}
.sheet-cancel {
  width: 100%; padding: 12px;
  border-radius: 9px; background: transparent; color: var(--text2);
  font-size: 14px; font-family: 'Barlow', sans-serif;
  border: 1px solid var(--border); cursor: pointer;
}

.confirm-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.8); z-index: 600;
  align-items: center; justify-content: center; padding: 20px;
}
.confirm-overlay.open { display: flex; }
.confirm-box {
  background: var(--surface); border-radius: var(--radius);
  padding: 24px 20px; width: 100%; max-width: 320px; text-align: center;
}
.confirm-box h3 { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 800; margin-bottom: 8px; }
.confirm-box p { font-size: 13px; color: var(--text2); margin-bottom: 20px; line-height: 1.5; }
.confirm-yes {
  width: 100%; padding: 13px; border-radius: 9px;
  background: var(--danger); color: #fff;
  font-size: 15px; font-weight: 700; font-family: 'Barlow Condensed', sans-serif;
  letter-spacing: 0.04em; text-transform: uppercase;
  border: none; cursor: pointer; margin-bottom: 8px;
}
.confirm-no {
  width: 100%; padding: 11px; border-radius: 9px;
  background: transparent; color: var(--text2); font-size: 14px;
  font-family: 'Barlow', sans-serif;
  border: 1px solid var(--border); cursor: pointer;
}

/* TOAST */
.toast {
  position: fixed; bottom: calc(var(--nav-h) + var(--safe-bottom) + 12px);
  left: 50%; transform: translateX(-50%);
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 20px; padding: 10px 20px;
  font-size: 13px; font-weight: 600; color: var(--text);
  z-index: 700; opacity: 0; transition: opacity 0.3s;
  pointer-events: none; white-space: nowrap;
}
.toast.show { opacity: 1; }
.toast.ok { border-color: var(--accent); color: var(--accent); }
.toast.err { border-color: var(--danger); color: var(--danger); }

/* PAGE: ACTIVE — special layout */
#page-active {
  display: none; flex-direction: column;
  height: 100%; padding: 0;
}
#page-active.active { display: flex; }
</style>
</head>
<body>

<div id="app">
  <header class="app-header" id="app-header">
    <span class="header-logo">⚡<span> Gym</span>Log</span>
    <span class="header-date" id="header-date"></span>
  </header>

  <div class="pages-wrap" id="pages-wrap">

    <!-- TREINOS -->
    <div class="page active" id="page-treinos">
      <div style="height:4px"></div>
      <div class="section-label">Meus Treinos</div>
      <div id="workout-list"></div>
      <button class="add-btn" onclick="openAddWorkout()">＋ Novo Treino</button>
    </div>

    <!-- EXERCÍCIOS -->
    <div class="page" id="page-exercicios">
      <button class="back-btn" onclick="navigate('treinos')">← Voltar</button>
      <div class="workout-page-header">
        <div class="workout-page-letter" id="ex-letter"></div>
        <div class="workout-page-info">
          <h2 id="ex-title"></h2>
          <p id="ex-subtitle"></p>
        </div>
      </div>
      <div id="exercise-list"></div>
      <button class="add-btn" onclick="openAddExercise()" style="margin-bottom:12px">＋ Adicionar Exercício</button>
      <button class="start-btn" onclick="startWorkout()">▶ Iniciar Treino</button>
    </div>

    <!-- TREINO ATIVO -->
    <div class="page" id="page-active">
      <div class="active-top">
        <div class="active-top-row">
          <span class="active-workout-name" id="active-title"></span>
          <span class="active-timer" id="active-timer">00:00</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="active-progress" style="width:0%"></div></div>
        <div class="progress-txt" id="active-progress-label"></div>
      </div>
      <div id="page-active-inner"></div>
      <div class="active-btns">
        <button class="finish-btn" id="finish-btn" onclick="finishWorkout()">🏁 Finalizar Treino</button>
        <button class="cancel-btn" onclick="cancelWorkout()">Cancelar Treino</button>
      </div>
    </div>

    <!-- HISTÓRICO -->
    <div class="page" id="page-historico">
      <div style="height:4px"></div>
      <div class="section-label">Histórico</div>
      <div id="history-list"></div>
    </div>

    <!-- EVOLUÇÃO -->
    <div class="page" id="page-evolucao">
      <div style="height:4px"></div>
      <div class="section-label">Evolução por Exercício</div>
      <div id="evo-content"></div>
    </div>

    <!-- PERFIL -->
    <div class="page" id="page-perfil">
      <div style="height:4px"></div>
      <div class="section-label">Resumo</div>
      <div class="stat-grid" id="stat-grid"></div>

      <div class="section-label">Backup dos Dados</div>
      <button class="action-btn" onclick="exportBackup()">
        <div class="action-icon exp">💾</div>
        <div class="action-info">
          <div class="action-title">Exportar Backup</div>
          <div class="action-sub">Baixa arquivo .json com todos os dados</div>
        </div>
      </button>
      <button class="action-btn" onclick="document.getElementById('file-input').click()">
        <div class="action-icon imp">📂</div>
        <div class="action-info">
          <div class="action-title">Importar Backup</div>
          <div class="action-sub">Restaura dados de um arquivo .json</div>
        </div>
      </button>
      <input type="file" id="file-input" accept=".json" style="display:none" onchange="importBackup(event)">
      <div class="last-bk" id="last-bk"></div>

      <div class="danger-zone">
        <div class="section-label">Zona de Perigo</div>
        <button class="action-btn" onclick="confirmDo('Apagar todos os dados?','Treinos, exercícios e histórico serão removidos permanentemente.',clearAll)">
          <div class="action-icon del">🗑</div>
          <div class="action-info">
            <div class="action-title">Apagar Todos os Dados</div>
            <div class="action-sub">Remove tudo deste dispositivo</div>
          </div>
        </button>
      </div>
    </div>

  </div><!-- /pages-wrap -->

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav" id="bottom-nav">
    <div class="nav-item active" id="nav-treinos" onclick="navigate('treinos')">
      <span class="nav-icon">🏋️</span><span>Treinos</span>
    </div>
    <div class="nav-item" id="nav-historico" onclick="navigate('historico')">
      <span class="nav-icon">📋</span><span>Histórico</span>
    </div>
    <div class="nav-item" id="nav-evolucao" onclick="navigate('evolucao')">
      <span class="nav-icon">📈</span><span>Evolução</span>
    </div>
    <div class="nav-item" id="nav-perfil" onclick="navigate('perfil')">
      <span class="nav-icon">👤</span><span>Perfil</span>
    </div>
  </nav>
</div>

<!-- MODAL: TREINO -->
<div class="overlay" id="modal-workout">
  <div class="sheet">
    <h3 id="modal-workout-title">Novo Treino</h3>
    <input class="sheet-input" id="workout-name-input" placeholder="Ex: Treino A — Peito e Tríceps">
    <button class="sheet-confirm" onclick="confirmAddWorkout()">Salvar</button>
    <button class="sheet-cancel" onclick="closeModal('modal-workout')">Cancelar</button>
  </div>
</div>

<!-- MODAL: EXERCÍCIO -->
<div class="overlay" id="modal-exercise">
  <div class="sheet">
    <h3>Novo Exercício</h3>
    <input class="sheet-input" id="ex-name-input" placeholder="Ex: Supino Reto">
    <input class="sheet-input" id="ex-sets-input" placeholder="Nº de séries (ex: 4)" type="number" min="1" max="20">
    <input class="sheet-input" id="ex-reps-input" placeholder="Nº de repetições (ex: 12)" type="number" min="1" max="100">
    <button class="sheet-confirm" onclick="confirmAddExercise()">Adicionar</button>
    <button class="sheet-cancel" onclick="closeModal('modal-exercise')">Cancelar</button>
  </div>
</div>

<!-- CONFIRM -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <h3 id="confirm-title"></h3>
    <p id="confirm-msg"></p>
    <button class="confirm-yes" id="confirm-yes-btn">Confirmar</button>
    <button class="confirm-no" onclick="closeConfirm()">Cancelar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
// ── CONSTANTS ──────────────────────────────────────────
const KEY = 'gymlog_v4';
const LETTERS = ['A','B','C','D','E','F','G','H','I','J'];
const DAYS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const MONTHS = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

// ── STATE ──────────────────────────────────────────────
let state = {
  workouts: [],
  history: [],
  currentWorkout: null,
  lastBackup: null
};

let confirmCallback = null;
let timerInterval = null;
let workoutStartTime = null;
let editingWorkoutId = null;
let activeChart = null;

// ── PERSISTENCE ────────────────────────────────────────
function save() {
  try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e) {}
}
function load() {
  try {
    const s = localStorage.getItem(KEY);
    if (s) Object.assign(state, JSON.parse(s));
  } catch(e) {}
}

// ── TOAST ──────────────────────────────────────────────
let toastTimer;
function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  clearTimeout(toastTimer);
  el.textContent = msg;
  el.className = 'toast ' + type + ' show';
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── BACKUP ─────────────────────────────────────────────
function exportBackup() {
  const data = { version: 2, exportedAt: new Date().toISOString(), workouts: state.workouts, history: state.history };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `gymlog-backup-${new Date().toISOString().split('T')[0]}.json`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  state.lastBackup = new Date().toISOString();
  save(); updateLastBkLabel();
  toast('Backup exportado! 💾');
}

function importBackup(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.workouts || !data.history) { toast('Arquivo inválido', 'err'); return; }
      confirmDo('Importar backup?', 'Os dados atuais serão substituídos pelos dados do arquivo.', () => {
        state.workouts = data.workouts || [];
        state.history = data.history || [];
        state.lastBackup = new Date().toISOString();
        save(); navigate('treinos');
        toast('Dados restaurados com sucesso!');
      });
    } catch(err) { toast('Erro ao ler o arquivo', 'err'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function clearAll() {
  state.workouts = []; state.history = []; state.lastBackup = null;
  save(); navigate('treinos');
  toast('Todos os dados foram apagados', 'err');
}

function updateLastBkLabel() {
  const el = document.getElementById('last-bk'); if (!el) return;
  if (state.lastBackup) {
    const d = new Date(state.lastBackup);
    el.textContent = `Último backup: ${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()} às ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  } else { el.textContent = 'Nenhum backup realizado ainda'; }
}

// ── HEADER DATE ────────────────────────────────────────
const now = new Date();
document.getElementById('header-date').textContent = `${DAYS[now.getDay()]}, ${now.getDate()} ${MONTHS[now.getMonth()]}`;

// ── NAVIGATION ─────────────────────────────────────────
function navigate(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  const nav = document.getElementById('nav-' + page);
  if (nav) nav.classList.add('active');
  document.getElementById('app-header').style.display = '';
  document.getElementById('bottom-nav').style.display = '';
  if (page === 'treinos') renderWorkouts();
  if (page === 'historico') renderHistory();
  if (page === 'evolucao') renderEvolucao();
  if (page === 'perfil') renderPerfil();
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
}

function getLetter(i) { return LETTERS[i % LETTERS.length]; }

// ── TREINOS ────────────────────────────────────────────
function renderWorkouts() {
  const el = document.getElementById('workout-list');
  if (!state.workouts.length) {
    el.innerHTML = '<p style="color:var(--text3);font-size:14px;padding:20px 0 12px">Nenhum treino ainda. Crie o primeiro!</p>';
    return;
  }
  el.innerHTML = state.workouts.map((w, i) => `
    <div class="workout-card">
      <div class="workout-letter">${getLetter(i)}</div>
      <div class="workout-info" onclick="openWorkout(${w.id})">
        <div class="workout-name">${w.name}</div>
        <div class="workout-meta">${w.exercises.length} exercício${w.exercises.length !== 1 ? 's' : ''}</div>
      </div>
      <div class="workout-actions">
        <button class="icon-btn" onclick="openEditWorkout(${w.id})">✏️</button>
        <button class="icon-btn danger" onclick="confirmDo('Apagar treino?','Todos os exercícios serão perdidos.',function(){deleteWorkout(${w.id})})">🗑</button>
      </div>
    </div>`).join('');
}

function openAddWorkout() {
  editingWorkoutId = null;
  document.getElementById('modal-workout-title').textContent = 'Novo Treino';
  document.getElementById('workout-name-input').value = '';
  document.getElementById('modal-workout').classList.add('open');
  setTimeout(() => document.getElementById('workout-name-input').focus(), 200);
}

function openEditWorkout(id) {
  editingWorkoutId = id;
  const w = state.workouts.find(x => x.id === id);
  document.getElementById('modal-workout-title').textContent = 'Editar Nome';
  document.getElementById('workout-name-input').value = w.name;
  document.getElementById('modal-workout').classList.add('open');
  setTimeout(() => document.getElementById('workout-name-input').focus(), 200);
}

function confirmAddWorkout() {
  const name = document.getElementById('workout-name-input').value.trim();
  if (!name) return;
  if (editingWorkoutId !== null) {
    const w = state.workouts.find(x => x.id === editingWorkoutId);
    if (w) {
      w.name = name;
      if (state.currentWorkout === editingWorkoutId) document.getElementById('ex-title').textContent = name;
    }
  } else {
    const maxId = state.workouts.reduce((m, w) => Math.max(m, w.id), 0);
    state.workouts.push({ id: maxId + 1, name, exercises: [] });
  }
  save(); closeModal('modal-workout'); renderWorkouts();
}

function deleteWorkout(id) {
  state.workouts = state.workouts.filter(w => w.id !== id);
  save(); renderWorkouts();
}

function openWorkout(id) {
  state.currentWorkout = id;
  const w = state.workouts.find(x => x.id === id);
  document.getElementById('ex-letter').textContent = getLetter(state.workouts.indexOf(w));
  document.getElementById('ex-title').textContent = w.name;
  renderExercises(); showPage('exercicios');
}

// ── EXERCÍCIOS ─────────────────────────────────────────
function renderExercises() {
  const w = state.workouts.find(x => x.id === state.currentWorkout); if (!w) return;
  document.getElementById('ex-subtitle').textContent = `${w.exercises.length} exercício${w.exercises.length !== 1 ? 's' : ''}`;
  const el = document.getElementById('exercise-list');
  if (!w.exercises.length) { el.innerHTML = '<p style="color:var(--text3);font-size:14px;padding:0 0 12px">Nenhum exercício ainda.</p>'; return; }
  el.innerHTML = w.exercises.map((ex, ei) => {
    const done = ex.sets.filter(s => s.done).length;
    return `<div class="exercise-card">
      <div class="exercise-header">
        <div class="ex-main" onclick="toggleEx(${ei})">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-summary">${done}/${ex.sets.length} séries</div>
        </div>
        <button class="icon-btn danger" onclick="confirmDo('Apagar exercício?','Será removido do treino.',function(){deleteExercise(${ei})})">🗑</button>
        <span class="ex-chevron" id="chev-${ei}" onclick="toggleEx(${ei})">▾</span>
      </div>
      <div class="ex-body" id="exbody-${ei}">
        <div class="set-labels"><div class="set-label">#</div><div class="set-label">Reps</div><div class="set-label">kg</div><div class="set-label">✓</div><div class="set-label"></div></div>
        ${ex.sets.map((s, si) => `<div class="set-row">
          <div class="set-num">${si + 1}</div>
          <input class="set-input" type="number" inputmode="decimal" value="${s.reps}" placeholder="12" onchange="updSet(${ei},${si},'reps',this.value)">
          <input class="set-input" type="number" inputmode="decimal" step="0.5" value="${s.weight}" placeholder="0" onchange="updSet(${ei},${si},'weight',this.value)">
          <div class="set-check ${s.done ? 'done' : ''}" onclick="togSet(${ei},${si})"></div>
          <button class="set-del" onclick="delSet(${ei},${si})">×</button>
        </div>`).join('')}
        <button class="add-set-btn" onclick="addSet(${ei})">+ Adicionar Série</button>
      </div>
    </div>`;}).join('');
}

function toggleEx(ei) { document.getElementById('exbody-'+ei)?.classList.toggle('open'); document.getElementById('chev-'+ei)?.classList.toggle('open'); }
function openBody(ei) { document.getElementById('exbody-'+ei)?.classList.add('open'); document.getElementById('chev-'+ei)?.classList.add('open'); }

function updSet(ei, si, f, v) { const w = state.workouts.find(x => x.id === state.currentWorkout); if (w) { w.exercises[ei].sets[si][f] = v; save(); } }
function togSet(ei, si) { const w = state.workouts.find(x => x.id === state.currentWorkout); if (w) { w.exercises[ei].sets[si].done = !w.exercises[ei].sets[si].done; save(); renderExercises(); openBody(ei); } }
function addSet(ei) { const w = state.workouts.find(x => x.id === state.currentWorkout); if (!w) return; const last = w.exercises[ei].sets.slice(-1)[0] || {reps:'12',weight:''}; w.exercises[ei].sets.push({reps:last.reps,weight:'',done:false}); save(); renderExercises(); openBody(ei); }
function delSet(ei, si) { const w = state.workouts.find(x => x.id === state.currentWorkout); if (!w || w.exercises[ei].sets.length <= 1) return; w.exercises[ei].sets.splice(si, 1); save(); renderExercises(); openBody(ei); }
function deleteExercise(ei) { const w = state.workouts.find(x => x.id === state.currentWorkout); if (!w) return; w.exercises.splice(ei, 1); save(); renderExercises(); }

function openAddExercise() {
  document.getElementById('modal-exercise').classList.add('open');
  setTimeout(() => document.getElementById('ex-name-input').focus(), 200);
}
function confirmAddExercise() {
  const name = document.getElementById('ex-name-input').value.trim();
  const setsN = parseInt(document.getElementById('ex-sets-input').value) || 3;
  const reps = document.getElementById('ex-reps-input').value || '12';
  if (!name) return;
  const w = state.workouts.find(x => x.id === state.currentWorkout); if (!w) return;
  const maxId = w.exercises.reduce((m, e) => Math.max(m, e.id), 0);
  w.exercises.push({id: maxId+1, name, sets: Array.from({length: Math.min(setsN,20)}, () => ({reps, weight:'', done:false}))});
  save();
  document.getElementById('ex-name-input').value = '';
  document.getElementById('ex-sets-input').value = '';
  document.getElementById('ex-reps-input').value = '';
  closeModal('modal-exercise'); renderExercises();
}

// ── TREINO ATIVO ───────────────────────────────────────
function startWorkout() {
  const w = state.workouts.find(x => x.id === state.currentWorkout);
  if (!w || !w.exercises.length) { toast('Adicione pelo menos um exercício!', 'err'); return; }
  w.exercises.forEach(ex => ex.sets.forEach(s => s.done = false));
  workoutStartTime = Date.now(); save();
  document.getElementById('app-header').style.display = 'none';
  document.getElementById('bottom-nav').style.display = 'none';
  showPage('active');
  document.getElementById('active-title').textContent = w.name;
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const e = Math.floor((Date.now() - workoutStartTime) / 1000);
    document.getElementById('active-timer').textContent =
      `${String(Math.floor(e/60)).padStart(2,'0')}:${String(e%60).padStart(2,'0')}`;
  }, 1000);
  renderActiveWorkout();
}

function renderActiveWorkout() {
  const w = state.workouts.find(x => x.id === state.currentWorkout); if (!w) return;
  const total = w.exercises.reduce((a, ex) => a + ex.sets.length, 0);
  const done = w.exercises.reduce((a, ex) => a + ex.sets.filter(s => s.done).length, 0);
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('active-progress').style.width = pct + '%';
  document.getElementById('active-progress-label').textContent = `${done} de ${total} séries concluídas`;
  document.getElementById('finish-btn').classList.toggle('visible', done === total && total > 0);
  document.getElementById('page-active-inner').innerHTML = w.exercises.map((ex, ei) => {
    const exDone = ex.sets.filter(s => s.done).length;
    const allDone = exDone === ex.sets.length;
    return `<div class="active-ex-card">
      <div class="active-ex-header" onclick="document.getElementById('aex-${ei}')?.classList.toggle('open')">
        <div style="min-width:0">
          <div class="ex-name" style="${allDone?'color:var(--accent)':''}">${ex.name}</div>
          <div class="ex-summary" style="margin-top:2px">${exDone}/${ex.sets.length} séries</div>
        </div>
        <span class="active-ex-badge ${allDone?'done':''}">${allDone?'✓ Feito':`${exDone}/${ex.sets.length}`}</span>
      </div>
      <div class="ex-body ${ei===0?'open':''}" id="aex-${ei}">
        <div class="set-labels" style="grid-template-columns:22px 1fr 1fr 30px;gap:6px">
          <div class="set-label">#</div><div class="set-label">Reps</div><div class="set-label">kg</div><div class="set-label">✓</div>
        </div>
        ${ex.sets.map((s,si) => `<div style="display:grid;grid-template-columns:22px 1fr 1fr 30px;gap:6px;align-items:center;margin-bottom:8px;opacity:${s.done?0.5:1}">
          <div class="set-num">${si+1}</div>
          <input class="set-input" type="number" inputmode="decimal" value="${s.reps}" placeholder="12" onchange="aUpdSet(${ei},${si},'reps',this.value)">
          <input class="set-input" type="number" inputmode="decimal" step="0.5" value="${s.weight}" placeholder="0" onchange="aUpdSet(${ei},${si},'weight',this.value)">
          <div class="set-check ${s.done?'done':''}" onclick="aTogSet(${ei},${si})"></div>
        </div>`).join('')}
      </div>
    </div>`;}).join('');
}

function aUpdSet(ei, si, f, v) { const w = state.workouts.find(x => x.id === state.currentWorkout); if (w) { w.exercises[ei].sets[si][f] = v; save(); } }
function aTogSet(ei, si) {
  const w = state.workouts.find(x => x.id === state.currentWorkout); if (!w) return;
  w.exercises[ei].sets[si].done = !w.exercises[ei].sets[si].done;
  save(); renderActiveWorkout();
  const next = w.exercises.findIndex(ex => ex.sets.some(s => !s.done));
  if (next >= 0) document.getElementById('aex-'+next)?.classList.add('open');
}

function finishWorkout() {
  const w = state.workouts.find(x => x.id === state.currentWorkout); if (!w) return;
  const elapsed = Math.floor((Date.now() - workoutStartTime) / 1000);
  const dur = `${String(Math.floor(elapsed/60)).padStart(2,'0')}:${String(elapsed%60).padStart(2,'0')}`;
  const totalSets = w.exercises.reduce((a, ex) => a + ex.sets.length, 0);
  const totalVol = w.exercises.reduce((a, ex) => a + ex.sets.reduce((b, s) => b + (parseFloat(s.weight)||0)*(parseInt(s.reps)||0), 0), 0);
  state.history.unshift({
    date: new Date().toISOString().split('T')[0],
    workoutName: w.name, totalSets, totalVolume: Math.round(totalVol), duration: dur,
    exercises: w.exercises.map(ex => ({name: ex.name, sets: ex.sets.map(s => ({reps: s.reps, weight: s.weight}))}))
  });
  w.exercises.forEach(ex => ex.sets.forEach(s => s.done = false));
  clearInterval(timerInterval); save();
  document.getElementById('app-header').style.display = '';
  document.getElementById('bottom-nav').style.display = '';
  toast('Treino finalizado! 💪');
  navigate('historico');
}

function cancelWorkout() {
  confirmDo('Cancelar treino?', 'O progresso desta sessão será perdido.', () => {
    const w = state.workouts.find(x => x.id === state.currentWorkout);
    if (w) w.exercises.forEach(ex => ex.sets.forEach(s => s.done = false));
    clearInterval(timerInterval); save();
    document.getElementById('app-header').style.display = '';
    document.getElementById('bottom-nav').style.display = '';
    navigate('treinos');
  });
}

// ── HISTÓRICO ──────────────────────────────────────────
function renderHistory() {
  const el = document.getElementById('history-list');
  if (!state.history.length) { el.innerHTML = '<p style="color:var(--text3);font-size:14px;text-align:center;padding:40px 0">Nenhum treino registrado ainda.</p>'; return; }
  el.innerHTML = state.history.map((h, hi) => {
    const d = new Date(h.date + 'T12:00:00');
    const detail = (h.exercises||[]).map(ex => `
      <div class="hist-ex-name">${ex.name}</div>
      ${ex.sets.map((s,si) => `<div class="hist-set-row"><span class="hist-set-lbl">Série ${si+1}</span><span>${s.reps} reps${s.weight?' · '+s.weight+' kg':''}</span></div>`).join('')}`).join('');
    return `<div class="history-card">
      <div class="history-card-head" onclick="togHist(${hi})">
        <div style="flex:1;min-width:0">
          <div class="hist-date">${DAYS[d.getDay()]}, ${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}</div>
          <div class="hist-name">${h.workoutName}</div>
          <div class="hist-stats">
            <div class="hist-stat"><span>${h.totalSets}</span> séries</div>
            ${h.totalVolume?`<div class="hist-stat"><span>${h.totalVolume.toLocaleString('pt-BR')} kg</span></div>`:''}
            ${h.duration?`<div class="hist-stat"><span>${h.duration}</span></div>`:''}
          </div>
        </div>
        <span style="color:var(--text3);font-size:18px;flex-shrink:0" id="hchev-${hi}">›</span>
      </div>
      <div class="hist-detail" id="hdet-${hi}">${detail||'<p style="color:var(--text3);font-size:13px">Sem detalhes.</p>'}</div>
    </div>`;}).join('');
}
function togHist(hi) {
  const d = document.getElementById('hdet-'+hi);
  const c = document.getElementById('hchev-'+hi);
  d.classList.toggle('open'); c.textContent = d.classList.contains('open') ? '↓' : '›';
}

// ── EVOLUÇÃO ───────────────────────────────────────────
function renderEvolucao() {
  const names = [...new Set(state.history.flatMap(h => (h.exercises||[]).map(e => e.name)))].sort();
  const el = document.getElementById('evo-content');
  if (!names.length) { el.innerHTML = '<p style="color:var(--text3);font-size:14px;text-align:center;padding:40px 0">Complete treinos para ver a evolução.</p>'; return; }
  el.innerHTML = `<div id="evo-sel" style="margin-bottom:14px"></div><div class="evo-wrap" id="evo-wrap" style="display:none"><div class="evo-title" id="evo-title"></div><div class="evo-sub">Volume total (kg×reps) e peso máximo</div><canvas id="evo-canvas" height="200"></canvas><div id="evo-empty"></div></div>`;
  const sel = document.getElementById('evo-sel');
  sel.innerHTML = names.map(n => `<button class="evo-btn" onclick="showEvo('${n.replace(/'/g,"\\'")}',this)">${n}</button>`).join('');
  if (names.length) showEvo(names[0], sel.children[0]);
}
function showEvo(name, btn) {
  document.querySelectorAll('.evo-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const sessions = state.history.filter(h => (h.exercises||[]).some(e => e.name === name))
    .map(h => {
      const ex = h.exercises.find(e => e.name === name);
      const vol = ex.sets.reduce((s,x) => s + (parseFloat(x.weight)||0)*(parseInt(x.reps)||0), 0);
      const maxW = Math.max(...ex.sets.map(x => parseFloat(x.weight)||0));
      const d = new Date(h.date+'T12:00:00');
      return { label: `${d.getDate()} ${MONTHS[d.getMonth()]}`, vol: Math.round(vol), maxW };
    }).reverse();
  const wrap = document.getElementById('evo-wrap'); wrap.style.display = 'block';
  document.getElementById('evo-title').textContent = name;
  if (activeChart) { activeChart.destroy(); activeChart = null; }
  const emptyEl = document.getElementById('evo-empty');
  const canvas = document.getElementById('evo-canvas');
  if (sessions.length < 2) {
    canvas.style.display = 'none';
    emptyEl.innerHTML = '<p style="text-align:center;padding:20px 0;color:var(--text3);font-size:13px">Faça 2+ sessões para ver o gráfico.</p>';
    return;
  }
  canvas.style.display = 'block'; emptyEl.innerHTML = '';
  activeChart = new Chart(canvas.getContext('2d'), {
    type: 'line',
    data: {
      labels: sessions.map(s => s.label),
      datasets: [
        { label: 'Volume (kg×reps)', data: sessions.map(s => s.vol), borderColor: '#c8ff00', backgroundColor: 'rgba(200,255,0,0.08)', borderWidth: 2, pointBackgroundColor: '#c8ff00', pointRadius: 5, tension: 0.3, fill: true, yAxisID: 'y' },
        { label: 'Peso máx. (kg)', data: sessions.map(s => s.maxW), borderColor: '#5b8aff', backgroundColor: 'rgba(91,138,255,0)', borderWidth: 2, pointBackgroundColor: '#5b8aff', pointRadius: 5, tension: 0.3, yAxisID: 'y2', borderDash: [4,3] }
      ]
    },
    options: {
      responsive: true, interaction: { mode: 'index', intersect: false },
      plugins: { legend: { labels: { color: '#888', font: { size: 11 }, boxWidth: 14 } }, tooltip: { backgroundColor: '#1a1a1a', borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1, titleColor: '#f0f0f0', bodyColor: '#888', padding: 10 } },
      scales: {
        x: { ticks: { color: '#555', font: { size: 11 } }, grid: { color: 'rgba(255,255,255,0.04)' } },
        y: { ticks: { color: '#555', font: { size: 11 } }, grid: { color: 'rgba(255,255,255,0.04)' }, title: { display: true, text: 'Volume', color: '#555', font: { size: 10 } } },
        y2: { position: 'right', ticks: { color: '#5b8aff', font: { size: 11 } }, grid: { display: false }, title: { display: true, text: 'Peso máx.', color: '#5b8aff', font: { size: 10 } } }
      }
    }
  });
}

// ── PERFIL ─────────────────────────────────────────────
function renderPerfil() {
  const total = state.history.length;
  const series = state.history.reduce((a, h) => a + (h.totalSets||0), 0);
  const vol = state.history.reduce((a, h) => a + (h.totalVolume||0), 0);
  const exs = new Set(state.history.flatMap(h => (h.exercises||[]).map(e => e.name))).size;
  document.getElementById('stat-grid').innerHTML = `
    <div class="stat-tile"><div class="stat-val">${total}</div><div class="stat-lbl">Treinos</div></div>
    <div class="stat-tile"><div class="stat-val">${series}</div><div class="stat-lbl">Séries</div></div>
    <div class="stat-tile"><div class="stat-val">${vol > 0 ? Math.round(vol/1000)+'t' : '—'}</div><div class="stat-lbl">Volume</div></div>
    <div class="stat-tile"><div class="stat-val">${exs}</div><div class="stat-lbl">Exercícios</div></div>`;
  updateLastBkLabel();
}

// ── MODALS ─────────────────────────────────────────────
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function confirmDo(title, msg, cb) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-msg').textContent = msg;
  confirmCallback = cb;
  document.getElementById('confirm-overlay').classList.add('open');
}
document.getElementById('confirm-yes-btn').onclick = () => { if (confirmCallback) confirmCallback(); closeConfirm(); };
function closeConfirm() { document.getElementById('confirm-overlay').classList.remove('open'); confirmCallback = null; }

// ── INIT ───────────────────────────────────────────────
load();
renderWorkouts();

// PWA install prompt
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
